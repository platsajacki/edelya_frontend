name: CI/CD Pipeline

on:
  push:
    tags:
      - 'dev*'
      - 'v*'


jobs:
  # check:
  #   name: Check Project
  #   runs-on: ubuntu-latest
  #   outputs:
  #     actions_url: ${{ steps.set-action-url.outputs.actions_url }}

  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v4
  #     - name: Set up Node.js
  #       uses: actions/setup-node@v3
  #       with:
  #         node-version: '18'
  #     - name: Install dependencies
  #       run: npm ci
  #     - name: Try to build project
  #       run: npm run build
  #     - name: Set Actions URL
  #       id: set-action-url
  #       run: echo "actions_url=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}}" >> $GITHUB_OUTPUT

  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    # needs: check
    if: startsWith(github.ref, 'refs/tags/dev') || startsWith(github.ref, 'refs/tags/v')
    env:
      APP_NAME: edelya-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker registry
        uses: docker/login-action@v3
        with:
          registry: registry.corpdi.ru
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: registry.corpdi.ru/${{ env.APP_NAME }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify-result:
    name: Notify
    runs-on: ubuntu-latest
    needs:
      # - check
      - build
    env:
      APP_NAME: gamedi
    if: always() && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Send Telegram Notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            App: ${{ env.APP_NAME }}
            ${{ job.status == 'success' && '✅ Build was successful' || '❌ Build failed' }} for commit: ${{ github.sha }}.
            Build tag: ${{ github.ref_name }}
            Build status: ${{ job.status }}

            Committer: ${{ github.actor }}
            Commit: ${{ github.event.head_commit.message }}
            Branch: ${{ github.ref_name }}
